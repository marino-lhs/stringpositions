    const { useState, useEffect, useRef, useCallback } = React;

/* ═══════════════════════════════════════════════
   GLOBAL STYLES
═══════════════════════════════════════════════ */
const CSS = `

/* ═══════════════════════════════════════════════
   MUSIC THEORY DATA — POSITIONS
═══════════════════════════════════════════════ */
// For a given (instrument, position, string), the note -> finger mapping.
//
// For violin/viola we currently only use natural notes, so the keys are bare
// letters: { 'B': 1, 'C': 2, ... }
//
// For cello we need accidentals too. Cello positions span a perfect 4th on
// each string, which means each position contains both naturals and
// chromatics. The keys here use a "noteId" form: letter + accidental code,
// where the accidental code is "" (natural), "#", or "b". So:
//   { 'A#': 1, 'B': 2, 'C': 3, 'C#': 4 }  for cello A-string Half position.
//
// A given physical pitch has two enharmonic spellings (A# and Bb both map to
// the same finger on the same string). The POSITIONS map only stores ONE
// spelling per pitch; the helpers below normalize lookups so either spelling
// resolves to the right finger.
const POSITIONS = {
  violin: {
    2: {
      G: { B: 1, C: 2, D: 3, E: 4 },
      D: { F: 1, G: 2, A: 3, B: 4 },
      A: { C: 1, D: 2, E: 3, F: 4 },
      E: { G: 1, A: 2, B: 3, C: 4 },
    },
    3: {
      G: { C: 1, D: 2, E: 3, F: 4 },
      D: { G: 1, A: 2, B: 3, C: 4 },
      A: { D: 1, E: 2, F: 3, G: 4 },
      E: { A: 1, B: 2, C: 3, D: 4 },
    },
    4: {
      G: { D: 1, E: 2, F: 3, G: 4 },
      D: { A: 1, B: 2, C: 3, D: 4 },
      A: { E: 1, F: 2, G: 3, A: 4 },
      E: { B: 1, C: 2, D: 3, E: 4 },
    },
  },
  viola: {
    2: {
      C: { E: 1, F: 2, G: 3, A: 4 },
      G: { B: 1, C: 2, D: 3, E: 4 },
      D: { F: 1, G: 2, A: 3, B: 4 },
      A: { C: 1, D: 2, E: 3, F: 4 },
    },
    3: {
      C: { F: 1, G: 2, A: 3, B: 4 },
      G: { C: 1, D: 2, E: 3, F: 4 },
      D: { G: 1, A: 2, B: 3, C: 4 },
      A: { D: 1, E: 2, F: 3, G: 4 },
    },
    4: {
      C: { G: 1, A: 2, B: 3, C: 4 },
      G: { D: 1, E: 2, F: 3, G: 4 },
      D: { A: 1, B: 2, C: 3, D: 4 },
      A: { E: 1, F: 2, G: 3, A: 4 },
    },
  },
  // Cello: 7 positions covering Half through 4th. Each position spans a
  // perfect 4th on each string. Note IDs use letter + accidental
  // (e.g. 'A#', 'Bb', 'C', 'C#'). The helpers below normalize enharmonics
  // so either spelling resolves to the same finger.
  cello: {
    // Half Position — 1st finger a half-step above the open string
    0.5: {
      C: { 'C#': 1, 'D':  2, 'D#': 3, 'E':  4 },
      G: { 'G#': 1, 'A':  2, 'A#': 3, 'B':  4 },
      D: { 'D#': 1, 'E':  2, 'F':  3, 'F#': 4 },
      A: { 'A#': 1, 'B':  2, 'C':  3, 'C#': 4 },
    },
    // 1st Position — 1st finger a whole step above the open string
    1: {
      C: { 'D':  1, 'D#': 2, 'E':  3, 'F':  4 },
      G: { 'A':  1, 'A#': 2, 'B':  3, 'C':  4 },
      D: { 'E':  1, 'F':  2, 'F#': 3, 'G':  4 },
      A: { 'B':  1, 'C':  2, 'C#': 3, 'D':  4 },
    },
    // High 1st / Low 2nd — 1st finger a minor 3rd above the open string
    1.5: {
      C: { 'D#': 1, 'E':  2, 'F':  3, 'F#': 4 },
      G: { 'A#': 1, 'B':  2, 'C':  3, 'C#': 4 },
      D: { 'F':  1, 'F#': 2, 'G':  3, 'G#': 4 },
      A: { 'C':  1, 'C#': 2, 'D':  3, 'D#': 4 },
    },
    // 2nd Position — 1st finger a major 3rd above the open string
    2: {
      C: { 'E':  1, 'F':  2, 'F#': 3, 'G':  4 },
      G: { 'B':  1, 'C':  2, 'C#': 3, 'D':  4 },
      D: { 'F#': 1, 'G':  2, 'G#': 3, 'A':  4 },
      A: { 'C#': 1, 'D':  2, 'D#': 3, 'E':  4 },
    },
    // 3rd Position — 1st finger a perfect 4th above the open string
    3: {
      C: { 'F':  1, 'F#': 2, 'G':  3, 'G#': 4 },
      G: { 'C':  1, 'C#': 2, 'D':  3, 'D#': 4 },
      D: { 'G':  1, 'G#': 2, 'A':  3, 'A#': 4 },
      A: { 'D':  1, 'D#': 2, 'E':  3, 'F':  4 },
    },
    // High 3rd / Low 4th — 1st finger a tritone above the open string
    3.5: {
      C: { 'F#': 1, 'G':  2, 'G#': 3, 'A':  4 },
      G: { 'C#': 1, 'D':  2, 'D#': 3, 'E':  4 },
      D: { 'G#': 1, 'A':  2, 'A#': 3, 'B':  4 },
      A: { 'D#': 1, 'E':  2, 'F':  3, 'F#': 4 },
    },
    // 4th Position — 1st finger a perfect 5th above the open string
    4: {
      C: { 'G':  1, 'G#': 2, 'A':  3, 'A#': 4 },
      G: { 'D':  1, 'D#': 2, 'E':  3, 'F':  4 },
      D: { 'A':  1, 'A#': 2, 'B':  3, 'C':  4 },
      A: { 'E':  1, 'F':  2, 'F#': 3, 'G':  4 },
    },
  },
  // Bass positions are added below in generateBassPositions(). Bass uses a
  // different convention: positions are named by the letter of the note that
  // 1st finger plays on the G string (e.g. "A" position = 1st finger on G
  // string plays A). Available fingers in the lower positions: 1, 2, 4.
  // (Finger 3 doubles with 4 in classical bass technique.)
  bass: {},
};

// --- Bass position generator -----------------------------------------------
// For each named position, finger 1 sits a fixed number of half-steps above
// the open string. We list the half-step offsets here; the rest is mechanical.
const BASS_POSITIONS = [
  { id: 'G#', offset: 1 },  // G#/Ab on G string
  { id: 'A',  offset: 2 },
  { id: 'A#', offset: 3 },
  { id: 'B',  offset: 4 },
  { id: 'C',  offset: 5 },
  { id: 'C#', offset: 6 },
  { id: 'D',  offset: 7 },
  { id: 'D#', offset: 8 },
  { id: 'E',  offset: 9 },
];

// Convert a MIDI number into a noteId string ('C', 'C#', 'D', ...) using
// sharps. Used to populate position maps with consistent spelling; the
// enharmonic-aware grader handles flats too.
const SHARP_SPELLING = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
function midiToSharpNoteId(midi) {
  return SHARP_SPELLING[((midi % 12) + 12) % 12];
}

// Bass open strings (WRITTEN pitch — bass clef, octave higher than sounding):
// E2, A2, D3, G3.
const BASS_OPEN_MIDI = { E: 40, A: 45, D: 50, G: 55 };
const BASS_STRINGS = ['E', 'A', 'D', 'G'];

(function buildBassPositions() {
  for (const { id, offset } of BASS_POSITIONS) {
    const stringMaps = {};
    for (const str of BASS_STRINGS) {
      const openMidi = BASS_OPEN_MIDI[str];
      const f1Midi = openMidi + offset;
      const f2Midi = openMidi + offset + 1;
      const f4Midi = openMidi + offset + 2;
      stringMaps[str] = {
        [midiToSharpNoteId(f1Midi)]: 1,
        [midiToSharpNoteId(f2Midi)]: 2,
        [midiToSharpNoteId(f4Midi)]: 4,
      };
    }
    POSITIONS.bass[id] = stringMaps;
  }
})();

const OPEN_STRINGS = {
  violin: { G: 55, D: 62, A: 69, E: 76 },
  viola:  { C: 48, G: 55, D: 62, A: 69 },
  cello:  { C: 36, G: 43, D: 50, A: 57 }, // C2, G2, D3, A3
  bass:   BASS_OPEN_MIDI,                  // E2, A2, D3, G3 (written pitch)
};

const STRING_ORDER = {
  violin: ['G', 'D', 'A', 'E'],
  viola:  ['C', 'G', 'D', 'A'],
  cello:  ['C', 'G', 'D', 'A'],
  bass:   ['E', 'A', 'D', 'G'],
};

// Which positions are available per instrument (for the position selector).
// Cello uses the full 7-position list including half and "low" variants.
// Bass uses string-typed positions named by 1st finger note on G string.
const INSTR_POSITIONS = {
  violin: [2, 3, 4],
  viola:  [2, 3, 4],
  cello:  [0.5, 1, 1.5, 2, 3, 3.5, 4],
  bass:   BASS_POSITIONS.map(p => p.id),
};

const LETTER_SEMITONE = { C: 0, D: 2, E: 4, F: 5, G: 7, A: 9, B: 11 };

const INSTR = {
  violin: { name: 'Violin', clef: 'treble', desc: 'G · D · A · E  ·  Treble clef' },
  viola:  { name: 'Viola',  clef: 'alto',   desc: 'C · G · D · A  ·  Alto clef' },
  cello:  { name: 'Cello',  clef: 'bass',   desc: 'C · G · D · A  ·  Bass clef' },
  bass:   { name: 'Bass',   clef: 'bass',   desc: 'E · A · D · G  ·  Bass clef' },
};

/* ═══════════════════════════════════════════════
   MUSIC THEORY HELPERS
═══════════════════════════════════════════════ */
function noteToMidi(letter, accidental, octave) {
  return 12 * (octave + 1) + LETTER_SEMITONE[letter] + accidental;
}

// Parse a position map key like 'C', 'C#', 'Bb' into { letter, accidental }
// where accidental is -1, 0, or 1. Used for cello entries; violin/viola entries
// are bare letters and parse to accidental=0.
function parseNoteId(noteId) {
  const letter = noteId[0];
  const sym = noteId.slice(1);
  const accidental = sym === '#' ? 1 : sym === 'b' ? -1 : 0;
  return { letter, accidental };
}

// Build the MIDI pitch class (0..11) of a position-map key.
function noteIdPitchClass(noteId) {
  const { letter, accidental } = parseNoteId(noteId);
  return ((LETTER_SEMITONE[letter] + accidental) % 12 + 12) % 12;
}

function findNextLetterAbove(openMidi, letter) {
  for (let m = openMidi + 1; m < openMidi + 15; m++) {
    if (m % 12 === LETTER_SEMITONE[letter]) return m;
  }
  return null;
}

// Find the lowest MIDI value > openMidi that matches the given pitch class.
// Used to anchor cello fingerings — works whether the noteId is natural,
// sharp, or flat.
function findNextPitchClassAbove(openMidi, pitchClass) {
  for (let m = openMidi + 1; m < openMidi + 15; m++) {
    if (((m % 12) + 12) % 12 === pitchClass) return m;
  }
  return null;
}

// Compute the MIDI range of the four fingers on a string for a given position.
// Returns { lowMidi, highMidi } where lowMidi is finger 1 and highMidi is finger 4.
function getFingerRange(instrument, position, str) {
  const letterMap = POSITIONS[instrument][position][str];
  if (!letterMap) return null;
  const finger1Id = Object.keys(letterMap).find(k => letterMap[k] === 1);
  const finger4Id = Object.keys(letterMap).find(k => letterMap[k] === 4);
  const openMidi = OPEN_STRINGS[instrument][str];
  const lowMidi  = findNextPitchClassAbove(openMidi, noteIdPitchClass(finger1Id));
  const highMidi = findNextPitchClassAbove(openMidi, noteIdPitchClass(finger4Id));
  return { lowMidi, highMidi };
}

// For (instrument, position, letter, accidental, octave), figure out which
// string + finger plays this pitch. Accepts any enharmonic spelling.
function getFingerForNote(instrument, position, letter, accidental, octave) {
  const positionMap = POSITIONS[instrument][position];
  if (!positionMap) return null;
  const targetMidi = noteToMidi(letter, accidental, octave);
  const targetPC = ((targetMidi % 12) + 12) % 12;
  const strings = STRING_ORDER[instrument];

  for (const str of strings) {
    const letterMap = positionMap[str];
    if (!letterMap) continue;
    const range = getFingerRange(instrument, position, str);
    if (!range) continue;
    if (targetMidi < range.lowMidi || targetMidi > range.highMidi) continue;

    // Find the entry whose pitch class matches.
    for (const noteId of Object.keys(letterMap)) {
      if (noteIdPitchClass(noteId) === targetPC) {
        return { string: str, finger: letterMap[noteId] };
      }
    }
  }
  return null;
}

// Back-compat shim — older callers used (instr, pos, letter, octave).
function getStringForNote(instrument, position, letter, octave) {
  const r = getFingerForNote(instrument, position, letter, 0, octave);
  return r ? r.string : null;
}

// All valid (fingered) notes for a given instrument+position.
// Each entry: { letter, accidental, octave, string, finger, midi }
// For violin/viola positions (bare-letter keys) every entry has accidental=0.
// For cello positions every fingered pitch appears exactly once, in the
// spelling stored in POSITIONS (callers can re-spell enharmonically if needed).
function getValidNotesForPosition(instrument, position) {
  const positionMap = POSITIONS[instrument][position];
  const strings = STRING_ORDER[instrument];
  const result = [];
  for (const str of strings) {
    const letterMap = positionMap[str];
    if (!letterMap) continue;
    const range = getFingerRange(instrument, position, str);
    if (!range) continue;
    for (const noteId of Object.keys(letterMap)) {
      const { letter, accidental } = parseNoteId(noteId);
      // Search octaves to find the one that lands in the finger range.
      for (let octave = 1; octave <= 7; octave++) {
        const midi = noteToMidi(letter, accidental, octave);
        if (midi >= range.lowMidi && midi <= range.highMidi) {
          result.push({
            letter, accidental, octave,
            string: str, finger: letterMap[noteId], midi,
          });
        }
      }
    }
  }
  return result.sort((a, b) => a.midi - b.midi);
}

// Display name for a bass position id ('G#' -> 'G♯/A♭', 'A' -> 'A', etc.)
const BASS_POSITION_DISPLAY = {
  'G#': 'G♯/A♭',
  'A':  'A',
  'A#': 'A♯/B♭',
  'B':  'B',
  'C':  'C',
  'C#': 'C♯/D♭',
  'D':  'D',
  'D#': 'D♯/E♭',
  'E':  'E',
};

function ordinal(n) {
  // Bass positions are string-typed (e.g. 'A', 'G#').
  if (typeof n === 'string') return BASS_POSITION_DISPLAY[n] ?? n;
  if (n === 0.5) return 'Half';
  if (n === 1.5) return 'High 1st / Low 2nd';
  if (n === 3.5) return 'High 3rd / Low 4th';
  if (n === 1) return '1st';
  if (n === 2) return '2nd';
  if (n === 3) return '3rd';
  return n + 'th';
}

// Short label for compact UI buttons (the position selector grid).
function positionLabel(n) {
  if (typeof n === 'string') return BASS_POSITION_DISPLAY[n] ?? n;
  if (n === 0.5) return 'Half';
  if (n === 1.5) return 'Lo 2';
  if (n === 3.5) return 'Lo 4';
  return ordinal(n);
}

function pickRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

/* ═══════════════════════════════════════════════
   VEXFLOW HELPERS
═══════════════════════════════════════════════ */
// Convert (letter, accidental, octave) to VexFlow key string like "c#/4"
function noteToVexKey(letter, accidental, octave) {
  const acc = accidental === 1 ? '#' : accidental === -1 ? 'b' : '';
  return `${letter.toLowerCase()}${acc}/${octave}`;
}

// Compute the "staff line position" for stem direction logic.
// For each clef, the middle line corresponds to a specific note.
//   Treble: middle line = B4
//   Alto:   middle line = C4
//   Bass:   middle line = D3
// Returns a number where 0 = middle line, positive = above, negative = below.
function staffPosition(clef, letter, octave) {
  const LETTERS = ['C','D','E','F','G','A','B'];
  const stepIdx = LETTERS.indexOf(letter);
  const totalSteps = octave * 7 + stepIdx;
  // middle line = B4 for treble (4*7+6=34)
  //               C4 for alto   (4*7+0=28)
  //               D3 for bass   (3*7+1=22)
  const middleSteps =
    clef === 'treble' ? 34 :
    clef === 'bass'   ? 22 :
                        28;  // alto
  return totalSteps - middleSteps;
}

// Apply user's stem direction rules:
//   - Above middle line: stem down
//   - Below middle line: stem up
//   - On middle line: default up unless majority are stem-down
function computeStemDirections(notes, clef) {
  const VF = Vex.Flow;
  // First pass: assign a tentative direction per note
  const tentative = notes.map(n => {
    const p = staffPosition(clef, n.letter, n.octave);
    if (p > 0) return VF.Stem.DOWN;
    if (p < 0) return VF.Stem.UP;
    return null; // on middle line, decide later
  });
  // Count above vs below decisions to decide middle-line notes (majority rule)
  const downCount = tentative.filter(d => d === VF.Stem.DOWN).length;
  const upCount = tentative.filter(d => d === VF.Stem.UP).length;
  const middleDir = downCount > upCount ? VF.Stem.DOWN : VF.Stem.UP;
  return tentative.map(d => d === null ? middleDir : d);
}

// Compute beam group ranges within a measure: each group is [startIdx, endIdx]
// (inclusive) where notes are eighths within the same beat. Singleton eighths
// (an eighth by itself in a beat) are NOT included — they get flags.
function computeBeamGroups(notes) {
  const groups = [];
  let runningBeat = 0;
  let curStart = -1;
  let curStartBeat = 0;
  for (let i = 0; i < notes.length; i++) {
    const isEighth = notes[i].duration === 'eighth';
    if (isEighth) {
      if (curStart === -1) {
        curStart = i;
        curStartBeat = runningBeat;
      } else if (Math.floor(runningBeat) !== Math.floor(curStartBeat)) {
        // Eighth in different beat — close previous group, start new
        if (i - 1 >= curStart + 1) groups.push([curStart, i - 1]);
        // (a singleton eighth becomes its own potential start; we'll re-evaluate)
        curStart = i;
        curStartBeat = runningBeat;
      }
    } else {
      if (curStart !== -1 && i - 1 >= curStart + 1) {
        groups.push([curStart, i - 1]);
      }
      curStart = -1;
    }
    runningBeat += DURATION_BEATS[notes[i].duration];
  }
  if (curStart !== -1 && notes.length - 1 >= curStart + 1) {
    groups.push([curStart, notes.length - 1]);
  }
  return groups;
}

// Compute stem directions, but FORCE all notes in a beam group to share direction.
// For a beam group, pick the direction based on the note furthest from the middle line
// (standard engraving convention). This avoids VexFlow's mixed-stem fallback to flags.
function computeStemDirectionsForMeasure(notes, clef) {
  const VF = Vex.Flow;
  const beamGroups = computeBeamGroups(notes);

  // Start with per-note tentative directions
  const dirs = notes.map(n => {
    const p = staffPosition(clef, n.letter, n.octave);
    if (p > 0) return VF.Stem.DOWN;
    if (p < 0) return VF.Stem.UP;
    return null;
  });

  // Resolve middle-line notes first using majority rule
  const downCount = dirs.filter(d => d === VF.Stem.DOWN).length;
  const upCount = dirs.filter(d => d === VF.Stem.UP).length;
  const middleDir = downCount > upCount ? VF.Stem.DOWN : VF.Stem.UP;
  for (let i = 0; i < dirs.length; i++) {
    if (dirs[i] === null) dirs[i] = middleDir;
  }

  // For each beam group, override to a single direction.
  // Pick direction based on the note furthest from middle line:
  //   if max-distance note is above middle -> all stems DOWN
  //   if max-distance note is below middle -> all stems UP
  //   tie -> stems UP (engraving convention favors up when in doubt)
  for (const [start, end] of beamGroups) {
    let maxDist = 0;
    let maxAbove = false; // tracks whether the extreme is above middle
    for (let i = start; i <= end; i++) {
      const p = staffPosition(clef, notes[i].letter, notes[i].octave);
      const dist = Math.abs(p);
      if (dist > maxDist) {
        maxDist = dist;
        maxAbove = p > 0;
      }
      // On tie, do NOT update — first-set direction wins, but we want UP on tie,
      // so we explicitly only flip to "above" when strictly greater.
    }
    const groupDir = maxAbove ? VF.Stem.DOWN : VF.Stem.UP;
    for (let i = start; i <= end; i++) dirs[i] = groupDir;
  }

  return { dirs, beamGroups };
}

// Convert duration token to VexFlow duration.
// q=quarter, 8=eighth, qd=dotted quarter, h=half
const DURATION_VEX = {
  'quarter': 'q',
  'eighth': '8',
  'dotted-quarter': 'q',  // dot added via addDotToAll() below
  'half': 'h',
};
const DURATION_BEATS = {
  'quarter': 1,
  'eighth': 0.5,
  'dotted-quarter': 1.5,
  'half': 2,
};

/* ═══════════════════════════════════════════════
   ACCIDENTAL DISPLAY RULES
   Standard CMN rules:
   - An accidental (#, b, natural) carries through the rest of its measure
     for any note on the SAME staff position (same letter + octave).
   - Different octave = different staff position = independent state.
   - Barline cancels everything.
   - Courtesy naturals are conventional when the first note of a new measure
     reuses a staff position that was altered in the previous measure.
═══════════════════════════════════════════════ */

// Given the two measures of a phrase as arrays of notes (each having
// {letter, accidental, octave}), return a parallel array-of-arrays of strings:
// '#', 'b', 'n' (natural), or null (no glyph). Indexed [measureIdx][noteIdx].
function computePhraseAccidentals(m1, m2) {
  const result = [[], []];
  const measures = [m1, m2];

  // First pass over measure 1 to remember its ending state per staff position.
  const m1EndState = new Map(); // key = "letter|octave" -> accidental (-1,0,1)

  for (let mi = 0; mi < measures.length; mi++) {
    const measure = measures[mi];
    // State within this measure: letter|octave -> currently-active accidental
    // (a value of "unset" means no accidental has been seen on this position
    // in this measure yet, so the implied pitch is the natural).
    const state = new Map();

    for (let i = 0; i < measure.length; i++) {
      const n = measure[i];
      const key = `${n.letter}|${n.octave}`;
      const acc = n.accidental;          // -1, 0, or 1
      const prevInMeasure = state.get(key);

      let glyph = null;

      if (prevInMeasure === undefined) {
        // First time this staff position appears in this measure.
        if (acc !== 0) {
          glyph = acc === 1 ? '#' : 'b';
        } else if (mi === 1 && m1EndState.get(key) !== undefined && m1EndState.get(key) !== 0) {
          // Courtesy natural: prior measure left this staff position altered,
          // and this is the first occurrence in the new measure as a natural.
          glyph = 'n';
        }
        // else: natural with no prior alteration → no glyph needed.
      } else if (prevInMeasure !== acc) {
        // The active accidental on this position differs from this note's
        // pitch — must explicitly notate the change.
        glyph = acc === 1 ? '#' : acc === -1 ? 'b' : 'n';
      }
      // else: same accidental as already in force → no glyph needed.

      state.set(key, acc);
      result[mi].push(glyph);
    }

    if (mi === 0) {
      // Snapshot end-of-measure state for courtesy logic in m2.
      for (const [k, v] of state.entries()) m1EndState.set(k, v);
    }
  }
  return result;
}

/* ═══════════════════════════════════════════════
   STAFF VIEW — SINGLE NOTE (Mode 1)
═══════════════════════════════════════════════ */
function SingleNoteStaff({ letter, octave, accidental, clef }) {
  const containerRef = useRef(null);

  useEffect(() => {
    if (!containerRef.current || typeof Vex === 'undefined' || !Vex.Flow) return;
    const VF = Vex.Flow;
    const el = containerRef.current;
    el.innerHTML = '';

    try {
      // Outer container is wider; the staff inside is smaller and centered.
      const W = 240, H = 180;
      const STAVE_W = 130; // narrower staff for tighter framing
      const STAVE_X = (W - STAVE_W) / 2;

      const renderer = new VF.Renderer(el, VF.Renderer.Backends.SVG);
      renderer.resize(W, H);
      const ctx = renderer.getContext();

      // Parchment background
      const svgEl = el.querySelector('svg');
      if (svgEl) {
        const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        bg.setAttribute('x', '0');
        bg.setAttribute('y', '0');
        bg.setAttribute('width', String(W));
        bg.setAttribute('height', String(H));
        bg.setAttribute('fill', '#FBF7EE');
        bg.setAttribute('rx', '10');
        svgEl.insertBefore(bg, svgEl.firstChild);
      }

      const stave = new VF.Stave(STAVE_X, 60, STAVE_W);
      stave.addClef(clef);
      stave.setContext(ctx).draw();

      // Apply stem direction rule: above middle line = down, below = up, on = up by default
      const stemDir = computeStemDirections(
        [{ letter, octave }],
        clef
      )[0];

      const key = noteToVexKey(letter, accidental, octave);
      const note = new VF.StaveNote({
        clef,
        keys: [key],
        duration: 'q',
        stem_direction: stemDir,
      });
      if (accidental === 1) note.addAccidental(0, new VF.Accidental('#'));
      else if (accidental === -1) note.addAccidental(0, new VF.Accidental('b'));

      const voice = new VF.Voice({ num_beats: 1, beat_value: 4 });
      voice.setStrict(false);
      voice.addTickables([note]);

      // Format with smaller width so the note centers within the small stave
      new VF.Formatter().joinVoices([voice]).format([voice], STAVE_W - 50);
      voice.draw(ctx, stave);
    } catch (err) {
      console.error('VexFlow single-note render error:', err);
    }
  }, [letter, octave, accidental, clef]);

  return (
    <div ref={containerRef} style={{
      width: 240, height: 180, borderRadius: 10, overflow: 'hidden',
      background: '#FBF7EE', margin: '0 auto',
    }} />
  );
}

/* ═══════════════════════════════════════════════
   STAFF VIEW — PHRASE (Mode 2)
   Renders two measures using two adjacent VF.Stave objects.
═══════════════════════════════════════════════ */
function PhraseStaff({ phrase, clef, results }) {
  const containerRef = useRef(null);

  // Split phrase into two measures (each 4 beats)
  const splitPhraseIntoMeasures = (notes) => {
    const m1 = [], m2 = [];
    let beat = 0;
    for (const n of notes) {
      if (beat < 4) m1.push(n);
      else m2.push(n);
      beat += DURATION_BEATS[n.duration];
    }
    return [m1, m2];
  };

  const [m1, m2] = splitPhraseIntoMeasures(phrase);

  // Width sizing
  const m1Width = 100 + m1.length * 50; // clef + time sig + notes
  const m2Width = 30 + m2.length * 50;
  const W = m1Width + m2Width + 30;
  const H = 180;

  useEffect(() => {
    if (!containerRef.current || typeof Vex === 'undefined' || !Vex.Flow) return;
    const VF = Vex.Flow;
    const el = containerRef.current;
    el.innerHTML = '';

    try {
      const renderer = new VF.Renderer(el, VF.Renderer.Backends.SVG);
      renderer.resize(W, H);
      const ctx = renderer.getContext();

      // Parchment background
      const svgEl = el.querySelector('svg');
      if (svgEl) {
        const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        bg.setAttribute('x', '0');
        bg.setAttribute('y', '0');
        bg.setAttribute('width', String(W));
        bg.setAttribute('height', String(H));
        bg.setAttribute('fill', '#FBF7EE');
        bg.setAttribute('rx', '10');
        svgEl.insertBefore(bg, svgEl.firstChild);
      }

      // Compute which accidental glyph each note should display, applying
      // standard music-notation rules (carry through the measure on same
      // staff position, courtesy naturals across barlines).
      const accidentalGlyphs = computePhraseAccidentals(m1, m2);

      // Helper to make VF notes for a given measure slice
      const makeVfNotes = (notesSlice, stemSlice, indexOffset, glyphSlice) => {
        return notesSlice.map((n, idx) => {
          const key = noteToVexKey(n.letter, n.accidental, n.octave);
          const note = new VF.StaveNote({
            clef,
            keys: [key],
            duration: DURATION_VEX[n.duration],
            stem_direction: stemSlice[idx],
          });
          if (n.duration === 'dotted-quarter') {
            note.addDotToAll();
          }
          const g = glyphSlice[idx];
          if (g === '#') note.addAccidental(0, new VF.Accidental('#'));
          else if (g === 'b') note.addAccidental(0, new VF.Accidental('b'));
          else if (g === 'n') note.addAccidental(0, new VF.Accidental('n'));
          if (results) {
            const color = results[indexOffset + idx] ? '#15803d' : '#b91c1c';
            note.setStyle({ fillStyle: color, strokeStyle: color });
          }
          return note;
        });
      };

      // Compute stem directions and beam groups PER MEASURE
      // (this ensures middle-line majority rule applies per measure, and beam
      // groups force uniform stem direction within them)
      const m1Result = computeStemDirectionsForMeasure(m1, clef);
      const m2Result = computeStemDirectionsForMeasure(m2, clef);

      const stave1 = new VF.Stave(10, 50, m1Width);
      stave1.addClef(clef);
      stave1.addTimeSignature('4/4');
      stave1.setContext(ctx).draw();

      const stave2 = new VF.Stave(10 + m1Width, 50, m2Width + 10);
      stave2.setContext(ctx).draw();

      const vfM1 = makeVfNotes(m1, m1Result.dirs, 0, accidentalGlyphs[0]);
      const vfM2 = makeVfNotes(m2, m2Result.dirs, m1.length, accidentalGlyphs[1]);

      const beats1 = m1.reduce((s, n) => s + DURATION_BEATS[n.duration], 0);
      const beats2 = m2.reduce((s, n) => s + DURATION_BEATS[n.duration], 0);

      const voice1 = new VF.Voice({ num_beats: Math.round(beats1), beat_value: 4 });
      voice1.setStrict(false);
      voice1.addTickables(vfM1);

      const voice2 = new VF.Voice({ num_beats: Math.round(beats2), beat_value: 4 });
      voice2.setStrict(false);
      voice2.addTickables(vfM2);

      // Format each voice independently within its stave
      new VF.Formatter().joinVoices([voice1]).format([voice1], m1Width - 100);
      new VF.Formatter().joinVoices([voice2]).format([voice2], m2Width - 30);

      // Build beams BEFORE drawing the voices — Beam constructor marks each
      // note as beamed, which suppresses the individual flag glyphs.
      const beams1 = m1Result.beamGroups.map(([s, e]) => new VF.Beam(vfM1.slice(s, e + 1)));
      const beams2 = m2Result.beamGroups.map(([s, e]) => new VF.Beam(vfM2.slice(s, e + 1)));

      voice1.draw(ctx, stave1);
      voice2.draw(ctx, stave2);

      beams1.forEach(b => b.setContext(ctx).draw());
      beams2.forEach(b => b.setContext(ctx).draw());
    } catch (err) {
      console.error('VexFlow phrase render error:', err);
    }
  }, [phrase, clef, results]);

  return (
    <div ref={containerRef} style={{
      width: W, height: H, borderRadius: 10, overflow: 'hidden',
      background: '#FBF7EE', margin: '0 auto',
    }} />
  );
}

/* ═══════════════════════════════════════════════
   FINGER NUMBER ROW
═══════════════════════════════════════════════ */
// Available fingers per instrument. Bass classical technique uses 1, 2, 4
// in lower positions (3 doubles 4); other strings use 1-4.
const INSTR_FINGERS = {
  violin: [1, 2, 3, 4],
  viola:  [1, 2, 3, 4],
  cello:  [1, 2, 3, 4],
  bass:   [1, 2, 4],
};

function FingerRow({ instrument, onClick, selected, correct, showResult, disabled }) {
  const fingers = INSTR_FINGERS[instrument] ?? [1, 2, 3, 4];
  return (
    <div style={{ display: 'flex', gap: 16, justifyContent: 'center', marginTop: 8 }}>
      {fingers.map(f => {
        let className = 'finger-btn';
        if (showResult) {
          if (f === correct) className += ' correct';
          else if (f === selected && f !== correct) className += ' wrong';
        } else if (selected === f) {
          className += ' active';
        }
        return (
          <button
            key={f}
            className={className}
            disabled={disabled}
            onClick={() => onClick(f)}
            style={{
              width: 56, height: 56, borderRadius: '50%',
              fontSize: 22, lineHeight: 1,
            }}
          >
            {f}
          </button>
        );
      })}
    </div>
  );
}

/* ═══════════════════════════════════════════════
   PHRASE SYNTHESIS (fallback when no hand-written
   phrases exist for an instrument+position)
═══════════════════════════════════════════════ */
// Build an 8-beat phrase using only valid notes for the given (instrument,
// position). Level controls how disjunct the melody is:
//   1 — stepwise (mostly 1-2 scale-step motion)
//   2 — small leaps (up to a 3rd)
//   3 — mixed intervals (up to a 5th)
//   4 — disjunct (anything goes)
function synthesizePhrase(instrument, position, level) {
  const pool = getValidNotesForPosition(instrument, position);
  if (pool.length === 0) return [];

  // Max interval (in half-steps) between consecutive notes, by level.
  const maxLeap = { 1: 2, 2: 4, 3: 7, 4: 24 }[level] ?? 24;

  // Rhythmic templates totaling 8 beats. Mix of quarters, eighths, halves.
  // Each template's beats sum to exactly 8 AND has a natural boundary at
  // beat 4 so it splits cleanly into two 4/4 measures.
  const templates = [
    // 4 + 4
    ['quarter','quarter','quarter','quarter','quarter','quarter','half'],
    ['quarter','quarter','quarter','quarter','quarter','quarter','quarter','quarter'],
    ['eighth','eighth','quarter','quarter','quarter','quarter','quarter','half'],
    ['quarter','quarter','eighth','eighth','quarter','quarter','quarter','half'],
    ['quarter','dotted-quarter','eighth','quarter','quarter','quarter','half'],
    ['eighth','eighth','eighth','eighth','quarter','quarter','quarter','quarter','half'],
    ['quarter','eighth','eighth','quarter','quarter','quarter','eighth','eighth','quarter','quarter'],
    ['half','quarter','quarter','quarter','quarter','quarter','quarter'],
    ['quarter','quarter','half','eighth','eighth','quarter','quarter','quarter'],
  ];
  const rhythm = pickRandom(templates);

  // Walk through the rhythm, choosing each pitch to be within maxLeap of the
  // previous one. Start somewhere in the middle of the pool for a natural
  // tessitura.
  const startIdx = Math.floor(pool.length / 3) +
                   Math.floor(Math.random() * Math.max(1, Math.floor(pool.length / 3)));
  let prev = pool[Math.min(startIdx, pool.length - 1)];
  const phrase = [{
    letter: prev.letter, accidental: prev.accidental, octave: prev.octave,
    duration: rhythm[0],
  }];

  for (let i = 1; i < rhythm.length; i++) {
    // Candidates within maxLeap. Bias slightly toward smaller intervals.
    const candidates = pool.filter(n => Math.abs(n.midi - prev.midi) <= maxLeap);
    const pickPool = candidates.length > 0 ? candidates : pool;
    // Bias toward smaller intervals: weighted random by 1/(1+distance)
    const weights = pickPool.map(n => 1 / (1 + Math.abs(n.midi - prev.midi)));
    const totalW = weights.reduce((a, b) => a + b, 0);
    let r = Math.random() * totalW;
    let chosen = pickPool[0];
    for (let j = 0; j < pickPool.length; j++) {
      r -= weights[j];
      if (r <= 0) { chosen = pickPool[j]; break; }
    }
    phrase.push({
      letter: chosen.letter, accidental: chosen.accidental, octave: chosen.octave,
      duration: rhythm[i],
    });
    prev = chosen;
  }
  return phrase;
}

/* ═══════════════════════════════════════════════
   QUESTION GENERATION (MODE 1)
═══════════════════════════════════════════════ */
// For accidentals stored as a sharp in POSITIONS, the equivalent flat spelling.
// Used to randomize how chromatic notes are displayed. Naturals are returned
// as-is.
function enharmonicSpellings(letter, accidental) {
  if (accidental === 0) return [{ letter, accidental: 0 }];
  if (accidental === 1) {
    // X# = (X+1)b
    const next = { C: 'D', D: 'E', E: 'F', F: 'G', G: 'A', A: 'B', B: 'C' }[letter];
    // E# and B# are weird — skip those (we never store them anyway).
    if (next === 'F' || next === 'C') return [{ letter, accidental: 1 }];
    return [{ letter, accidental: 1 }, { letter: next, accidental: -1 }];
  }
  if (accidental === -1) {
    const prev = { C: 'B', D: 'C', E: 'D', F: 'E', G: 'F', A: 'G', B: 'A' }[letter];
    if (prev === 'E' || prev === 'B') return [{ letter, accidental: -1 }];
    return [{ letter, accidental: -1 }, { letter: prev, accidental: 1 }];
  }
  return [{ letter, accidental }];
}

function generateSingleNoteQuestion(instrument, position) {
  const validNotes = getValidNotesForPosition(instrument, position);
  const note = pickRandom(validNotes);
  // Adjust octave when re-spelling: Cb is in the octave above (e.g. A#3 = Bb3
  // — same octave; but C#3 = Db3 — also same octave). The only edge cases
  // are E# / B# / Cb / Fb which we excluded above, so spelling never crosses
  // an octave boundary here.
  const spelling = pickRandom(enharmonicSpellings(note.letter, note.accidental));
  return {
    letter: spelling.letter,
    accidental: spelling.accidental,
    octave: note.octave,
    correctString: note.string,
    correctFinger: note.finger,
    position,
  };
}

/* ═══════════════════════════════════════════════
   SCREEN: HOME / SETUP
═══════════════════════════════════════════════ */
// Unicode clef glyphs (rendered via Bravura/Times). Bass clef uses U+1D122.
const CLEF_GLYPH = { treble: '𝄞', alto: '𝄡', bass: '𝄢' };

function HomeScreen({
  instrument, setInstrument,
  positionMode, setPositionMode,
  onStartMode1, onStartMode2,
}) {
  const positions = INSTR_POSITIONS[instrument];
  // Number of columns in the position grid. We append "All" so total cells =
  // positions.length + 1. Pick a column count that gives balanced rows:
  //   violin/viola (3+1=4 cells): 4 cols × 1 row
  //   cello (7+1=8 cells):        4 cols × 2 rows
  //   bass (9+1=10 cells):        5 cols × 2 rows
  const totalCells = positions.length + 1;
  const posGridCols = totalCells <= 4 ? 4
                     : totalCells <= 8 ? 4
                     : 5;

  return (
    <div style={{
      minHeight: '100vh', display: 'flex', flexDirection: 'column',
      alignItems: 'center', padding: '32px 24px', background: '#0c1220',
    }}>
      <style>{CSS}</style>
      <div style={{ textAlign: 'center', marginBottom: 36, maxWidth: 700 }}>
        <div style={{
          fontFamily: "'Times New Roman',serif", fontSize: 44,
          color: '#c89b3c', marginBottom: 12, letterSpacing: 4,
        }}>𝄞 𝄡 𝄢</div>
        <h1 style={{
          fontFamily: "'Playfair Display',serif",
          fontSize: 'clamp(28px,5vw,44px)', fontWeight: 700,
          color: '#f1ece2', marginBottom: 8,
        }}>String Position Fingerings</h1>
        <p style={{ color: '#6b7280', fontSize: 15 }}>
          Practice position fingerings on violin, viola, cello, and bass
        </p>
      </div>

      <div style={{ width: '100%', maxWidth: 620 }}>
        <div style={{ marginBottom: 24 }}>
          <div style={{
            color: '#c89b3c', fontSize: 12, letterSpacing: 2,
            textTransform: 'uppercase', marginBottom: 10,
          }}>Instrument</div>
          <div style={{
            display: 'grid',
            gridTemplateColumns: 'repeat(auto-fit, minmax(135px, 1fr))',
            gap: 12,
          }}>
            {Object.entries(INSTR).map(([k, inst]) => (
              <button
                key={k}
                className={`opt-card ${instrument === k ? 'active' : ''}`}
                onClick={() => setInstrument(k)}
                style={{ padding: '14px 10px' }}
              >
                <div style={{ fontSize: 28, color: '#c89b3c', marginBottom: 4, fontFamily: "'Times New Roman',serif" }}>
                  {CLEF_GLYPH[inst.clef] ?? '𝄞'}
                </div>
                <div style={{
                  fontFamily: "'Playfair Display',serif",
                  fontSize: 17, fontWeight: 700, marginBottom: 4,
                }}>{inst.name}</div>
                <div style={{ fontSize: 11, color: '#6b7280' }}>{inst.desc}</div>
              </button>
            ))}
          </div>
        </div>

        <div style={{ marginBottom: 28 }}>
          <div style={{
            color: '#c89b3c', fontSize: 12, letterSpacing: 2,
            textTransform: 'uppercase', marginBottom: 10,
          }}>Position</div>
          <div style={{ display: 'grid', gridTemplateColumns: `repeat(${posGridCols}, 1fr)`, gap: 10 }}>
            {[...positions, 'all'].map(p => (
              <button
                key={p}
                className={`opt-card ${positionMode === p ? 'active' : ''}`}
                onClick={() => setPositionMode(p)}
                style={{ padding: '12px 6px' }}
              >
                <div style={{
                  fontFamily: "'Playfair Display',serif",
                  fontSize: 15, fontWeight: 700, lineHeight: 1.1,
                }}>{p === 'all' ? 'All' : positionLabel(p)}</div>
                <div style={{ fontSize: 10, color: '#6b7280', marginTop: 2 }}>
                  {p === 'all' ? `${positions.length} positions` : 'position'}
                </div>
              </button>
            ))}
          </div>
        </div>

        <div style={{
          color: '#c89b3c', fontSize: 12, letterSpacing: 2,
          textTransform: 'uppercase', marginBottom: 10,
        }}>Mode</div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 12 }}>
          <button className="opt-card" onClick={onStartMode1}>
            <div style={{ fontSize: 28, marginBottom: 6 }}>♩</div>
            <div style={{
              fontFamily: "'Playfair Display',serif",
              fontSize: 18, fontWeight: 700, marginBottom: 4,
            }}>Single Note</div>
            <div style={{ fontSize: 12, color: '#6b7280' }}>
              See a note · click the finger
            </div>
          </button>
          <button className="opt-card" onClick={onStartMode2}>
            <div style={{ fontSize: 28, marginBottom: 6 }}>♪♪♪</div>
            <div style={{
              fontFamily: "'Playfair Display',serif",
              fontSize: 18, fontWeight: 700, marginBottom: 4,
            }}>Phrase</div>
            <div style={{ fontSize: 12, color: '#6b7280' }}>
              See a 2-bar phrase · finger every note
            </div>
          </button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   SCREEN: MODE 1 — SINGLE NOTE
═══════════════════════════════════════════════ */
function Mode1Screen({ instrument, positionMode, onBack }) {
  const clef = INSTR[instrument].clef;

  // Determine which position to use for each question
  const pickPosition = useCallback(() => {
    if (positionMode === 'all') return pickRandom(INSTR_POSITIONS[instrument]);
    return positionMode;
  }, [positionMode, instrument]);

  const [question, setQuestion] = useState(() =>
    generateSingleNoteQuestion(instrument, pickPosition())
  );
  const [selected, setSelected] = useState(null);
  const [showResult, setShowResult] = useState(false);
  const [score, setScore] = useState({ correct: 0, total: 0 });

  const onFinger = (f) => {
    if (showResult) return;
    setSelected(f);
    setShowResult(true);
    setScore(s => ({
      correct: s.correct + (f === question.correctFinger ? 1 : 0),
      total: s.total + 1,
    }));
  };

  const next = () => {
    setQuestion(generateSingleNoteQuestion(instrument, pickPosition()));
    setSelected(null);
    setShowResult(false);
  };

  const isCorrect = selected === question.correctFinger;

  return (
    <div style={{
      minHeight: '100vh', padding: '24px 20px', background: '#0c1220', position: 'relative',
    }}>
      <style>{CSS}</style>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20, maxWidth: 700, margin: '0 auto 20px' }}>
        <button className="ghost-btn" onClick={onBack}>← Home</button>
        <div style={{ color: '#6b7280', fontSize: 14 }}>
          Score: <span style={{ color: '#f1ece2', fontWeight: 600 }}>{score.correct} / {score.total}</span>
        </div>
      </div>

      <div style={{ maxWidth: 600, margin: '0 auto', textAlign: 'center' }}>
        <div style={{
          color: '#c89b3c', fontSize: 12, letterSpacing: 3,
          textTransform: 'uppercase', marginBottom: 6,
        }}>{INSTR[instrument].name}</div>
        <div style={{
          fontFamily: "'Playfair Display',serif",
          fontSize: 28, fontWeight: 700, color: '#f1ece2', marginBottom: 24,
        }}>{ordinal(question.position)} Position</div>

        <SingleNoteStaff
          letter={question.letter}
          accidental={question.accidental}
          octave={question.octave}
          clef={clef}
        />

        <div style={{ color: '#6b7280', fontSize: 13, marginTop: 18, marginBottom: 4 }}>
          Which finger?
        </div>

        <FingerRow
          instrument={instrument}
          onClick={onFinger}
          selected={selected}
          correct={question.correctFinger}
          showResult={showResult}
          disabled={showResult}
        />

        {showResult && (
          <div className="slide" style={{
            marginTop: 24, padding: 16, borderRadius: 10,
            background: isCorrect ? 'rgba(34,197,94,0.15)' : 'rgba(239,68,68,0.15)',
            border: `1px solid ${isCorrect ? '#22c55e' : '#ef4444'}`,
            color: '#f1ece2', maxWidth: 460, margin: '24px auto 0',
          }}>
            <div style={{ fontWeight: 600, marginBottom: isCorrect ? 0 : 6 }}>
              {isCorrect ? 'Correct!' : 'Not quite.'}
            </div>
            {!isCorrect && (
              <div style={{ fontSize: 14, color: '#cbd5e1', lineHeight: 1.5 }}>
                {question.letter}{question.accidental === 1 ? '♯' : question.accidental === -1 ? '♭' : ''}{question.octave} in {ordinal(question.position)} position is
                on the <strong style={{ color: '#c89b3c' }}>{question.correctString} string</strong>,
                played with finger <strong style={{ color: '#c89b3c' }}>{question.correctFinger}</strong>.
              </div>
            )}
            <button className="primary-btn" onClick={next} style={{ marginTop: 14 }}>
              Next note →
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   SCREEN: MODE 2 — PHRASE
═══════════════════════════════════════════════ */
function Mode2Screen({ instrument, positionMode, onBack }) {
  const clef = INSTR[instrument].clef;
  const [level, setLevel] = useState(1);

  // Pick the position for each phrase. For "all", randomize per phrase
  // among the positions valid for this instrument.
  const pickPosition = useCallback(() => {
    if (positionMode === 'all') return pickRandom(INSTR_POSITIONS[instrument]);
    return positionMode;
  }, [positionMode, instrument]);

  // Pick a random phrase from the chosen position+level. If no pre-composed
  // phrases exist for this (instrument, position, level), synthesize one.
  const generatePhrase = useCallback(() => {
    const position = pickPosition();
    const phrasesAtLevel = PHRASES?.[instrument]?.[position]?.[level];
    if (phrasesAtLevel && phrasesAtLevel.length > 0) {
      const phrase = pickRandom(phrasesAtLevel);
      return { phrase, position };
    }
    return { phrase: synthesizePhrase(instrument, position, level), position };
  }, [instrument, level, pickPosition]);

  const [current, setCurrent] = useState(() => generatePhrase());
  const [fingerInputs, setFingerInputs] = useState(() => new Array(current.phrase.length).fill(null));
  const [activeIndex, setActiveIndex] = useState(0);
  const [results, setResults] = useState(null);
  const [score, setScore] = useState({ correct: 0, total: 0 });

  // When level changes, generate a new phrase
  useEffect(() => {
    const gen = generatePhrase();
    setCurrent(gen);
    setFingerInputs(new Array(gen.phrase.length).fill(null));
    setActiveIndex(0);
    setResults(null);
  }, [level, generatePhrase]);

  // Keyboard input
  useEffect(() => {
    const allowedKeys = INSTR_FINGERS[instrument].map(String);
    const handleKey = (e) => {
      if (results) return;
      if (allowedKeys.includes(e.key)) {
        e.preventDefault();
        enterFinger(parseInt(e.key));
      } else if (e.key === 'Backspace' || e.key === 'ArrowLeft') {
        e.preventDefault();
        setActiveIndex(i => Math.max(0, i - 1));
      } else if (e.key === 'ArrowRight') {
        e.preventDefault();
        setActiveIndex(i => Math.min(current.phrase.length - 1, i + 1));
      } else if (e.key === 'Enter' && fingerInputs.every(f => f !== null) && !results) {
        e.preventDefault();
        handleSubmit();
      }
    };
    window.addEventListener('keydown', handleKey);
    return () => window.removeEventListener('keydown', handleKey);
  });

  const enterFinger = (f) => {
    if (results) return;
    setFingerInputs(prev => {
      const next = [...prev];
      next[activeIndex] = f;
      return next;
    });
    setActiveIndex(i => Math.min(current.phrase.length - 1, i + 1));
  };

  const handleSubmit = () => {
    const newResults = current.phrase.map((n, i) => {
      const r = getFingerForNote(instrument, current.position, n.letter, n.accidental, n.octave);
      return r && fingerInputs[i] === r.finger;
    });
    setResults(newResults);
    setScore(s => ({
      correct: s.correct + newResults.filter(r => r).length,
      total: s.total + current.phrase.length,
    }));
  };

  const handleNextPhrase = () => {
    const gen = generatePhrase();
    setCurrent(gen);
    setFingerInputs(new Array(gen.phrase.length).fill(null));
    setActiveIndex(0);
    setResults(null);
  };

  const allFilled = fingerInputs.every(f => f !== null);

  return (
    <div style={{
      minHeight: '100vh', padding: '24px 20px', background: '#0c1220', position: 'relative',
    }}>
      <style>{CSS}</style>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20, maxWidth: 900, margin: '0 auto 20px' }}>
        <button className="ghost-btn" onClick={onBack}>← Home</button>
        <div style={{ color: '#6b7280', fontSize: 14 }}>
          Score: <span style={{ color: '#f1ece2', fontWeight: 600 }}>{score.correct} / {score.total}</span>
        </div>
      </div>

      <div style={{ maxWidth: 900, margin: '0 auto', textAlign: 'center' }}>
        <div style={{
          color: '#c89b3c', fontSize: 12, letterSpacing: 3,
          textTransform: 'uppercase', marginBottom: 6,
        }}>{INSTR[instrument].name}</div>
        <div style={{
          fontFamily: "'Playfair Display',serif",
          fontSize: 26, fontWeight: 700, color: '#f1ece2', marginBottom: 14,
        }}>{ordinal(current.position)} Position</div>

        {/* Level selector */}
        <div style={{ display: 'flex', justifyContent: 'center', gap: 8, marginBottom: 20, flexWrap: 'wrap' }}>
          {[1, 2, 3, 4].map(lv => (
            <button
              key={lv}
              onClick={() => setLevel(lv)}
              style={{
                padding: '6px 14px', borderRadius: 6,
                background: level === lv ? '#c89b3c' : 'transparent',
                color: level === lv ? '#0c1220' : '#6b7280',
                border: `1px solid ${level === lv ? '#c89b3c' : '#253348'}`,
                fontFamily: "'DM Sans',sans-serif", fontSize: 13, fontWeight: 600,
                cursor: 'pointer',
              }}
            >
              Level {lv}: {LEVEL_NAMES[lv]}
            </button>
          ))}
        </div>

        {/* Staff */}
        <div style={{ overflowX: 'auto', marginBottom: 20 }}>
          <PhraseStaff
            phrase={current.phrase}
            clef={clef}
            results={results}
          />
        </div>

        {/* Finger entry boxes (showing what the user has entered) */}
        <div style={{
          display: 'flex', gap: 8, justifyContent: 'center', flexWrap: 'wrap',
          marginBottom: 14,
        }}>
          {current.phrase.map((n, i) => {
            const isActive = !results && activeIndex === i;
            const r = results?.[i];
            return (
              <button
                key={i}
                onClick={() => !results && setActiveIndex(i)}
                disabled={!!results}
                style={{
                  width: 36, height: 36, borderRadius: 6,
                  background: r === true ? 'rgba(34,197,94,0.25)' : r === false ? 'rgba(239,68,68,0.25)' : isActive ? '#fde68a' : '#fbf7ee',
                  border: isActive ? '2px solid #c89b3c' : '1px solid #8896aa',
                  color: '#222', fontWeight: 700, fontSize: 16,
                  cursor: results ? 'default' : 'pointer',
                  fontFamily: "'DM Sans',sans-serif",
                }}
              >
                {fingerInputs[i] !== null ? fingerInputs[i] : ''}
              </button>
            );
          })}
        </div>

        {/* Number row buttons */}
        <FingerRow
          instrument={instrument}
          onClick={enterFinger}
          selected={null}
          correct={null}
          showResult={false}
          disabled={!!results}
        />

        <div style={{ color: '#6b7280', fontSize: 12, marginTop: 12 }}>
          Click numbers to fill, or use keys {INSTR_FINGERS[instrument].join('/')} · Backspace/← to go back · Enter to submit
        </div>

        {/* Submit / Next */}
        <div style={{ marginTop: 18 }}>
          {!results && (
            <button
              className="primary-btn"
              onClick={handleSubmit}
              disabled={!allFilled}
            >Submit</button>
          )}
          {results && (
            <div className="slide" style={{
              padding: 16, borderRadius: 10,
              background: '#162032', border: '1px solid #253348',
              color: '#f1ece2', maxWidth: 600, margin: '0 auto',
            }}>
              <div style={{ fontWeight: 600, marginBottom: 8, fontSize: 16 }}>
                {results.filter(r => r).length} of {current.phrase.length} correct
              </div>
              {results.some(r => !r) && (
                <div style={{ fontSize: 13, color: '#cbd5e1', marginBottom: 12, lineHeight: 1.7 }}>
                  Correct fingerings:&nbsp;
                  {current.phrase.map((n, i) => {
                    const r = getFingerForNote(instrument, current.position, n.letter, n.accidental, n.octave);
                    const accSym = n.accidental === 1 ? '♯' : n.accidental === -1 ? '♭' : '';
                    return (
                      <span key={i} style={{
                        marginRight: 10,
                        color: results[i] ? '#22c55e' : '#ef4444',
                        fontFamily: 'monospace',
                      }}>
                        {n.letter}{accSym}{n.octave}={r?.finger}
                        <span style={{ color: '#6b7280', fontSize: 11 }}>({r?.string})</span>
                      </span>
                    );
                  })}
                </div>
              )}
              <button className="primary-btn" onClick={handleNextPhrase}>Next phrase →</button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   APP ROOT
═══════════════════════════════════════════════ */
function App() {
  const [screen, setScreen] = useState('home');
  const [instrument, setInstrument] = useState('violin');
  const [positionMode, setPositionMode] = useState(3);

  // When the user switches instrument, snap positionMode to a valid value
  // for the new instrument if the current one isn't supported. ('all' is
  // always valid; numeric positions get clamped.)
  const handleSetInstrument = (next) => {
    setInstrument(next);
    const validPositions = INSTR_POSITIONS[next];
    if (positionMode !== 'all' && !validPositions.includes(positionMode)) {
      // Pick the closest available position by numeric value, defaulting to
      // the middle of the new instrument's range.
      const fallback = validPositions[Math.floor(validPositions.length / 2)];
      setPositionMode(fallback);
    }
  };

  if (screen === 'mode1') {
    return <Mode1Screen instrument={instrument} positionMode={positionMode} onBack={() => setScreen('home')} />;
  }
  if (screen === 'mode2') {
    return <Mode2Screen instrument={instrument} positionMode={positionMode} onBack={() => setScreen('home')} />;
  }
  return (
    <HomeScreen
      instrument={instrument}
      setInstrument={handleSetInstrument}
      positionMode={positionMode}
      setPositionMode={setPositionMode}
      onStartMode1={() => setScreen('mode1')}
      onStartMode2={() => setScreen('mode2')}
    />
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
